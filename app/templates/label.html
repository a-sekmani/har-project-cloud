<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Windows</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --accent: #2563eb; --green: #16a34a; --orange: #ea580c; --red: #dc2626; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 20px 0; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .site-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 12px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .site-logo { font-weight: 700; font-size: 1.25rem; color: var(--text); }
        .site-logo:hover { text-decoration: none; color: var(--accent); }
        .site-nav { display: flex; flex-wrap: wrap; gap: 8px; }
        .site-nav a { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.875rem; }
        .site-nav a:hover { background: var(--border); text-decoration: none; }
        .header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        .header .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; width: 100%; }
        .header label { margin-right: 6px; color: var(--muted); font-size: 0.875rem; }
        .header select, .header input[type="number"], .header input[type="text"] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); min-width: 100px; font-size: 0.875rem; }
        .header .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
        .header .filters .cb { display: inline-flex; align-items: center; gap: 6px; font-size: 0.875rem; }
        .header .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--border); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn.primary:hover { filter: brightness(1.05); }
        .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
        .meta .error { color: var(--red); }
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--border); font-weight: 600; font-size: 0.8rem; }
        tr:hover { background: #f1f5f9; }
        .win-id { font-family: ui-monospace, monospace; font-size: 0.85em; }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; margin: 0 2px; }
        .row-error { color: var(--red); font-size: 0.8rem; }
        .conf-high { color: var(--green); }
        .conf-mid { color: var(--orange); }
        .conf-low { color: var(--red); }
        .pagination { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; padding: 12px 0; }
        .pagination .btn-page { min-width: 36px; }
        .pagination .btn-page.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="/dashboard" class="site-logo">HAR Cloud App</a>
            <nav class="site-nav">
                <a href="/dashboard">Dashboard</a>
                <a href="/windows">Recent Windows</a>
                <a href="/persons">Person Management</a>
            </nav>
        </header>
        <h1>Label Windows</h1>
        <div class="header">
            <div class="filter-row">
                <div>
                    <label for="model_key">Model</label>
                    <select id="model_key">
                        {% for m in models %}
                        <option value="{{ m }}" {% if m == model_key %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="limit">Limit</label>
                    <select id="limit">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div>
                    <label for="filter_person">Person</label>
                    <select id="filter_person">
                        <option value="">— All —</option>
                    </select>
                </div>
                <div>
                    <label for="filter_device">Device</label>
                    <select id="filter_device">
                        <option value="">— All —</option>
                    </select>
                </div>
                <div>
                    <label for="filter_camera">Camera</label>
                    <select id="filter_camera">
                        <option value="">— All —</option>
                    </select>
                </div>
                <div>
                    <label for="filter_activity">Activity</label>
                    <select id="filter_activity">
                        <option value="">— All —</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filters">
                    <label class="cb"><input type="checkbox" id="filter_only_unlabeled"> Only unlabeled</label>
                    <label class="cb"><input type="checkbox" id="filter_only_labeled"> Only labeled</label>
                    <label class="cb"><input type="checkbox" id="filter_only_mismatches"> Only mismatches</label>
                    <label for="filter_pred_conf">Pred conf below</label>
                    <input type="number" id="filter_pred_conf" placeholder="e.g. 0.6" min="0" max="1" step="0.1" style="width:60px">
                    <label class="cb"><input type="checkbox" id="auto_refresh" checked> Auto-refresh (5s)</label>
                </div>
                <div class="actions">
                    <button type="button" class="btn primary" id="refresh_now">Refresh now</button>
                </div>
            </div>
        </div>
        <div class="meta">
            <span id="last_error" class="error"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="select_all" title="Select all"></th>
                    <th>Time</th>
                    <th>Window ID</th>
                    <th>Device</th>
                    <th>Camera</th>
                    <th>Track</th>
                    <th>Person</th>
                    <th>Face Conf</th>
                    <th>Activity</th>
                    <th>Set label</th>
                    <th>Predicted</th>
                    <th>Pred Conf</th>
                    <th>Match?</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="14" style="text-align:center;color:var(--muted);">Loading…</td></tr>
            </tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
    <script>
(function() {
    const API_KEY = {{ api_key|tojson }};
    const API_HEADERS = { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' };
    let currentLabels = {{ labels|tojson }};
    let fetchInProgress = false;
    let refreshTimer = null;
    let currentRows = [];
    let currentPage = 1;
    let hasMore = false;

    function escapeAttr(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildParams() {
        const params = new URLSearchParams();
        const model = document.getElementById('model_key').value;
        if (model) params.set('model_key', model);
        const limit = parseInt(document.getElementById('limit').value, 10);
        params.set('limit', limit);
        params.set('offset', (currentPage - 1) * limit);
        const person = document.getElementById('filter_person').value;
        if (person) params.set('person_id', person);
        const dev = document.getElementById('filter_device').value;
        if (dev) params.set('device_id', dev);
        const cam = document.getElementById('filter_camera').value;
        if (cam) params.set('camera_id', cam);
        const activity = document.getElementById('filter_activity').value;
        if (activity) params.set('pred_label', activity);
        if (document.getElementById('filter_only_unlabeled').checked) params.set('only_unlabeled', 'true');
        if (document.getElementById('filter_only_labeled').checked) params.set('only_labeled', 'true');
        if (document.getElementById('filter_only_mismatches').checked) params.set('only_mismatches', 'true');
        const pc = document.getElementById('filter_pred_conf').value;
        if (pc !== '') params.set('max_pred_conf', pc);
        return params;
    }

    function fetchFilterOptions() {
        fetch('/v1/dashboard/filter-options', { headers: { 'X-API-Key': API_KEY } })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => {
                const devSel = document.getElementById('filter_device');
                const camSel = document.getElementById('filter_camera');
                const curDev = devSel.value;
                const curCam = camSel.value;
                const devices = Array.isArray(data.devices) ? data.devices : [];
                const cameras = Array.isArray(data.cameras) ? data.cameras : [];
                devSel.innerHTML = '<option value="">— All —</option>' + devices.map(d => '<option value="' + escapeAttr(d) + '">' + escapeAttr(d) + '</option>').join('');
                camSel.innerHTML = '<option value="">— All —</option>' + cameras.map(c => '<option value="' + escapeAttr(c) + '">' + escapeAttr(c) + '</option>').join('');
                if (curDev && devices.indexOf(curDev) !== -1) devSel.value = curDev;
                if (curCam && cameras.indexOf(curCam) !== -1) camSel.value = curCam;
            })
            .catch(() => {});
    }

    function fillActivityFilter(labels) {
        const sel = document.getElementById('filter_activity');
        const cur = sel.value;
        const list = Array.isArray(labels) ? labels : [];
        sel.innerHTML = '<option value="">— All —</option>' + list.map(l => '<option value="' + escapeAttr(l) + '">' + escapeAttr(l) + '</option>').join('');
        if (cur && list.indexOf(cur) !== -1) sel.value = cur;
    }

    function formatTime(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function shortId(id) { return id ? id.slice(0, 8) : '—'; }

    function confClass(c) {
        if (c == null) return '';
        if (c < 0.5) return 'conf-low';
        if (c < 0.75) return 'conf-mid';
        return 'conf-high';
    }

    function matchSymbol(row) {
        const label = (row.label || '').trim();
        const pred = (row.prediction || {}).pred_label;
        if (!label || !pred) return '—';
        return label === pred ? '✅' : '❌';
    }

    function renderTable(rows) {
        currentRows = rows;
        const tbody = document.getElementById('tbody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;color:var(--muted);">No windows.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(row => {
            const pred = row.prediction || {};
            const conf = pred.pred_conf;
            const confStr = conf != null ? conf.toFixed(2) : '—';
            const match = matchSymbol(row);
            const personName = row.person_name || (row.person_id ? shortId(row.person_id) : '—');
            const personConf = row.person_conf;
            const personCell = row.person_id
                ? '<a href="/persons/' + row.person_id + '">' + personName + '</a>'
                : personName;
            const opts = (currentLabels || []).map(l => '<option value="' + l + '"' + (row.label === l ? ' selected' : '') + '>' + l + '</option>').join('');
            return '<tr data-id="' + (row.id || '') + '">' +
                '<td><input type="checkbox" class="row-cb" data-id="' + (row.id || '') + '"></td>' +
                '<td>' + formatTime(row.created_at) + '</td>' +
                '<td class="win-id">' + shortId(row.id) + ' <button type="button" class="btn btn-sm copy-id" data-id="' + (row.id || '') + '">Copy</button></td>' +
                '<td>' + (row.device_id ?? '—') + '</td>' +
                '<td>' + (row.camera_id ?? '—') + '</td>' +
                '<td>' + (row.track_id ?? '—') + '</td>' +
                '<td class="row-person">' + personCell + '</td>' +
                '<td class="row-person-conf"><span class="' + confClass(personConf) + '">' + (personConf != null ? personConf.toFixed(2) : '—') + '</span></td>' +
                '<td class="row-activity">' + (row.label || '—') + '</td>' +
                '<td><select class="set-label-sel" data-id="' + (row.id || '') + '"><option value="">—</option>' + opts + '</select> <button type="button" class="btn btn-sm set-label-btn" data-id="' + (row.id || '') + '">Set</button></td>' +
                '<td>' + (pred.pred_label || '—') + '</td>' +
                '<td>' + confStr + '</td>' +
                '<td class="row-match">' + match + '</td>' +
                '<td><span class="row-error"></span></td>' +
                '</tr>';
        }).join('');
        tbody.querySelectorAll('.copy-id').forEach(btn => {
            btn.addEventListener('click', () => navigator.clipboard.writeText(btn.dataset.id || ''));
        });
        tbody.querySelectorAll('.set-label-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tr = btn.closest('tr');
                const id = btn.dataset.id;
                const sel = tr.querySelector('.set-label-sel');
                const label = sel ? sel.value : '';
                setLabel(id, label, tr);
            });
        });
        document.getElementById('select_all').addEventListener('change', e => {
            tbody.querySelectorAll('.row-cb').forEach(cb => { cb.checked = e.target.checked; });
        });
    }

    function setLabel(windowId, label, trRow) {
        const errEl = trRow ? trRow.querySelector('.row-error') : null;
        if (errEl) errEl.textContent = '';
        fetch('/v1/windows/' + encodeURIComponent(windowId) + '/label', {
            method: 'POST',
            headers: API_HEADERS,
            body: JSON.stringify({ label: label || '', label_source: 'manual' })
        })
            .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
            .then(() => {
                if (trRow) {
                    const act = trRow.querySelector('.row-activity');
                    if (act) act.textContent = label || '—';
                    const row = currentRows.find(r => r.id === windowId);
                    if (row) row.label = label || null;
                    const m = trRow.querySelector('.row-match');
                    if (m) m.textContent = matchSymbol({ label: label || null, prediction: row ? row.prediction : null });
                }
            })
            .catch(err => {
                if (errEl) errEl.textContent = err.message || 'Failed';
            });
    }

    function fetchPersonFilter() {
        fetch('/v1/persons', { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : { persons: [] })
            .then(data => {
                const list = data.persons || [];
                const sel = document.getElementById('filter_person');
                const current = sel.value;
                sel.innerHTML = '<option value="">— All —</option>' + list.map(p => '<option value="' + escapeAttr(p.id) + '">' + escapeAttr(p.name || p.id) + '</option>').join('');
                if (current && list.some(p => p.id === current)) sel.value = current;
            })
            .catch(() => {});
    }

    function fetchData() {
        if (fetchInProgress) return;
        fetchInProgress = true;
        document.getElementById('last_error').textContent = '';
        const url = '/v1/dashboard/windows?' + buildParams().toString();
        fetch(url, { headers: { 'X-API-Key': API_KEY } })
            .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
            .then(resp => {
                const rows = (resp && resp.data !== undefined) ? resp.data : (Array.isArray(resp) ? resp : []);
                hasMore = (resp && resp.has_more === true);
                renderTable(rows);
                renderPagination();
            })
            .catch(err => {
                document.getElementById('last_error').textContent = 'Last error: ' + (err.message || 'Request failed');
            })
            .finally(() => { fetchInProgress = false; });
    }

    function loadModelLabels() {
        const model = document.getElementById('model_key').value;
        if (!model) { currentLabels = []; fillActivityFilter([]); return Promise.resolve(); }
        return fetch('/v1/models/' + encodeURIComponent(model), { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                currentLabels = data.labels || [];
                fillActivityFilter(currentLabels);
            })
            .catch(() => { currentLabels = []; fillActivityFilter([]); });
    }

    function renderPagination() {
        const limit = parseInt(document.getElementById('limit').value, 10);
        const el = document.getElementById('pagination');
        let html = '';
        if (currentPage > 1) {
            html += '<button type="button" class="btn btn-page" data-page="' + (currentPage - 1) + '">Prev</button>';
        }
        const maxShow = Math.max(currentPage, 5);
        for (let p = 1; p <= maxShow; p++) {
            html += '<button type="button" class="btn btn-page' + (p === currentPage ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
        }
        if (hasMore) {
            html += '<button type="button" class="btn btn-page" data-page="' + (currentPage + 1) + '">Next</button>';
        }
        el.innerHTML = html || '<span style="color:var(--muted);">Page ' + currentPage + '</span>';
        el.querySelectorAll('.btn-page').forEach(btn => {
            btn.addEventListener('click', () => {
                const p = parseInt(btn.dataset.page, 10);
                if (p >= 1) { currentPage = p; fetchData(); }
            });
        });
    }

    function scheduleRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (!document.getElementById('auto_refresh').checked) return;
        refreshTimer = setInterval(() => {
            if (document.visibilityState === 'hidden') return;
            fetchData();
        }, 5000);
    }

    document.getElementById('model_key').addEventListener('change', () => { currentPage = 1; loadModelLabels().then(fetchData); scheduleRefresh(); });
    document.getElementById('limit').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('auto_refresh').addEventListener('change', scheduleRefresh);
    ['filter_person','filter_device','filter_camera','filter_activity','filter_only_unlabeled','filter_only_labeled','filter_only_mismatches','filter_pred_conf'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', () => { currentPage = 1; fetchData(); });
    });
    document.getElementById('refresh_now').addEventListener('click', fetchData);

    fetchFilterOptions();
    fetchPersonFilter();
    loadModelLabels().then(() => { fetchData(); scheduleRefresh(); });
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = null; }
        else scheduleRefresh();
    });
})();
    </script>
</body>
</html>
