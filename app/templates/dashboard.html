<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --accent: #2563eb; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 20px 0; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .placeholder { text-align: center; padding: 60px 20px; color: var(--muted); }
        .placeholder p { margin: 10px 0; }
        .nav { display: flex; gap: 16px; margin-bottom: 24px; }
        .nav a { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); }
        .nav a:hover { background: var(--border); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>
        <nav class="nav">
            <a href="/windows">Recent Windows</a>
            <a href="/windows/label">Label Windows</a>
            <a href="/persons">Person Management</a>
        </nav>
        <div class="card">
            <div class="placeholder">
                <p>Dashboard is under construction.</p>
                <p>Use the navigation above to access available features.</p>
            </div>
        </div>
    </div>
</body>
</html>
