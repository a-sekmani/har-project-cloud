<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Models / System</title>
    <link rel="stylesheet" href="/static/css/untitled-ui.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="/dashboard" class="site-logo">HAR Cloud App</a>
            <nav class="site-nav">
                <a href="/dashboard"><span class="nav-icon icon-overview"></span>Overview</a>
                <a href="/windows"><span class="nav-icon icon-windows"></span>Activity Windows</a>
                <div class="nav-sub">
                    <a href="/windows/label">Edit Windows</a>
                </div>
                <a href="/persons"><span class="nav-icon icon-persons"></span>Person Management</a>
                <a href="/unknown-persons"><span class="nav-icon icon-unknown"></span>Unknown Persons</a>
                <a href="/alerts"><span class="nav-icon icon-alerts"></span>Alerts</a>
                <a href="/system" class="active"><span class="nav-icon icon-system"></span>Models / System</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="container">
        <h1>Models / System</h1>
        <div style="margin-bottom: 16px;">
            <button type="button" class="btn primary" id="refresh_btn">Refresh</button>
        </div>
        <div class="meta"><span id="last_error" class="error"></span></div>

        <div class="card">
            <h2>Current Activity Model</h2>
            <div id="section_model"></div>
        </div>
        <div class="card">
            <h2>Face Gallery Status</h2>
            <div id="section_gallery"></div>
        </div>
        <div class="card">
            <h2>Edge Status</h2>
            <div id="section_edge"></div>
        </div>
        <div class="card">
            <h2>Health</h2>
            <div id="section_health" class="health-grid"></div>
        </div>
            </div>
        </main>
    </div>
    <script>
(function() {
    const API_KEY = {{ api_key|tojson }};

    function row(key, value) {
        const v = value == null || value === '' ? '—' : (typeof value === 'object' ? JSON.stringify(value, null, 2) : String(value));
        return '<div class="sys-row"><span class="key">' + key + '</span><span class="value">' + (v.indexOf('\n') >= 0 ? '<pre>' + v + '</pre>' : v) + '</span></div>';
    }

    function render(data) {
        const m = data.current_activity_model || {};
        document.getElementById('section_model').innerHTML =
            row('model_key', m.model_key) +
            row('version', m.version) +
            row('input_shape', m.input_shape) +
            row('feature_spec', m.feature_spec) +
            row('date_loaded', m.date_loaded);

        const g = data.face_gallery || {};
        document.getElementById('section_gallery').innerHTML =
            row('gallery_version', g.gallery_version) +
            row('persons_count', g.persons_count) +
            row('faces_count', g.faces_count) +
            row('last_sync', g.last_sync);

        const e = data.edge_status || {};
        document.getElementById('section_edge').innerHTML =
            row('Last window received', e.last_window_at) +
            row('Windows today', e.windows_today) +
            row('Last active camera', e.last_active_camera) +
            row('Windows with person_id', e.windows_with_person_id);

        const h = data.health || {};
        const healthNames = { database: 'Database', face_gallery: 'Face Gallery', model_availability: 'Model Availability', prediction_service: 'Prediction Service' };
        document.getElementById('section_health').innerHTML = Object.keys(healthNames).map(function(k) {
            const status = h[k] === 'ok' ? 'ok' : 'error';
            return '<div class="health-item ' + status + '">' + healthNames[k] + ': ' + status + '</div>';
        }).join('');
    }

    function fetchStatus() {
        document.getElementById('last_error').textContent = '';
        fetch('/v1/system/status', { headers: { 'X-API-Key': API_KEY } })
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(render)
            .catch(function(err) {
                document.getElementById('last_error').textContent = 'Error: ' + (err.message || 'Failed to load');
            });
    }

    document.getElementById('refresh_btn').addEventListener('click', fetchStatus);
    fetchStatus();
})();
    </script>
</body>
</html>
