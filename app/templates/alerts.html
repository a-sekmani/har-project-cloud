<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts / Critical Events</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --accent: #2563eb; --green: #16a34a; --red: #dc2626; --orange: #ea580c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 20px 0; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .site-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 12px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .site-logo { font-weight: 700; font-size: 1.25rem; color: var(--text); }
        .site-logo:hover { text-decoration: none; color: var(--accent); }
        .site-nav { display: flex; flex-wrap: wrap; gap: 8px; }
        .site-nav a { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.875rem; }
        .site-nav a:hover { background: var(--border); text-decoration: none; }
        .site-nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        .header .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; width: 100%; }
        .header label { margin-right: 6px; color: var(--muted); font-size: 0.875rem; }
        .header select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); min-width: 100px; font-size: 0.875rem; }
        .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--border); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; margin: 0 2px; }
        .btn-sm.ack { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
        .btn-sm.res { background: #dcfce7; color: #166534; border-color: #86efac; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--border); font-weight: 600; font-size: 0.8rem; }
        tr:hover { background: #f1f5f9; }
        .status-new { color: var(--red); font-weight: 500; }
        .status-acknowledged { color: var(--orange); }
        .status-resolved { color: var(--green); }
        .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
        .meta .error { color: var(--red); }
        .empty { text-align: center; padding: 40px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="/dashboard" class="site-logo">HAR Cloud App</a>
            <nav class="site-nav">
                <a href="/dashboard">Overview</a>
                <a href="/windows">Recent Windows</a>
                <a href="/persons">Person Management</a>
                <a href="/unknown-persons">Unknown Persons</a>
                <a href="/alerts" class="active">Alerts / Critical Events</a>
                <a href="/system">Models / System</a>
            </nav>
        </header>
        <h1>Alerts / Critical Events</h1>
        <div class="header">
            <div class="filter-row">
                <div>
                    <label for="time_range">Time range</label>
                    <select id="time_range">
                        <option value="24h">Last 24 hours</option>
                        <option value="7d" selected>Last week</option>
                        <option value="30d">Last month</option>
                    </select>
                </div>
                <div>
                    <label for="model_key">Model</label>
                    <select id="model_key">
                        {% for m in models %}
                        <option value="{{ m }}" {% if m == model_key %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="status_filter">Status</label>
                    <select id="status_filter">
                        <option value="">All</option>
                        <option value="new">New</option>
                        <option value="acknowledged">Acknowledged</option>
                        <option value="resolved">Resolved</option>
                    </select>
                </div>
                <div>
                    <button type="button" class="btn primary" id="refresh_btn">Refresh</button>
                </div>
            </div>
        </div>
        <div class="meta"><span id="last_error" class="error"></span></div>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Person</th>
                    <th>Event</th>
                    <th>Confidence</th>
                    <th>Camera</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="7" class="empty">Loading…</td></tr>
            </tbody>
        </table>
    </div>
    <script>
(function() {
    const API_KEY = {{ api_key|tojson }};

    function getTimeRange() {
        const v = document.getElementById('time_range').value;
        const now = new Date();
        const until = now.toISOString();
        let since = new Date(now);
        if (v === '24h') since.setHours(since.getHours() - 24);
        else if (v === '7d') since.setDate(since.getDate() - 7);
        else if (v === '30d') since.setDate(since.getDate() - 30);
        return { since: since.toISOString(), until: until };
    }

    function buildParams() {
        const tr = getTimeRange();
        const params = new URLSearchParams();
        params.set('since', tr.since);
        params.set('until', tr.until);
        params.set('limit', '200');
        const model = document.getElementById('model_key').value;
        if (model) params.set('model_key', model);
        const status = document.getElementById('status_filter').value;
        if (status) params.set('status', status);
        return params;
    }

    function formatTime(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'medium' });
    }

    function statusClass(s) {
        if (s === 'new') return 'status-new';
        if (s === 'acknowledged') return 'status-acknowledged';
        return 'status-resolved';
    }

    function setStatus(windowId, status) {
        fetch('/v1/alerts/' + windowId + '/status', {
            method: 'POST',
            headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: status })
        })
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function() { fetchAlerts(); })
            .catch(function(err) {
                document.getElementById('last_error').textContent = 'Failed to update: ' + (err.message || '');
            });
    }

    function render(alerts) {
        const tbody = document.getElementById('tbody');
        if (!alerts || alerts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty">No alerts in this period.</td></tr>';
            return;
        }
        tbody.innerHTML = alerts.map(function(a) {
            const time = formatTime(a.time);
            const conf = a.confidence != null ? (a.confidence * 100).toFixed(0) + '%' : '—';
            const statusCls = statusClass(a.status);
            const viewUrl = '/windows?window_id=' + encodeURIComponent(a.window_id);
            return '<tr data-window-id="' + a.window_id + '">' +
                '<td>' + time + '</td>' +
                '<td>' + (a.person || 'Unknown') + '</td>' +
                '<td>' + (a.event || '—') + '</td>' +
                '<td>' + conf + '</td>' +
                '<td>' + (a.camera || '—') + '</td>' +
                '<td><span class="' + statusCls + '">' + (a.status || 'new') + '</span></td>' +
                '<td>' +
                (a.status !== 'acknowledged' ? '<button type="button" class="btn btn-sm ack" data-status="acknowledged">Acknowledge</button>' : '') +
                (a.status !== 'resolved' ? '<button type="button" class="btn btn-sm res" data-status="resolved">Resolve</button>' : '') +
                ' <a href="' + viewUrl + '" class="btn btn-sm">View</a>' +
                '</td></tr>';
        }).join('');
        tbody.querySelectorAll('button[data-status]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var row = btn.closest('tr');
                var id = row && row.dataset.windowId;
                if (id) setStatus(id, btn.dataset.status);
            });
        });
    }

    function fetchAlerts() {
        document.getElementById('last_error').textContent = '';
        document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="empty">Loading…</td></tr>';
        fetch('/v1/alerts?' + buildParams().toString(), { headers: { 'X-API-Key': API_KEY } })
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function(data) { render(data.alerts || []); })
            .catch(function(err) {
                document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="empty">Error: ' + (err.message || '') + '</td></tr>';
                document.getElementById('last_error').textContent = err.message || 'Failed to load';
            });
    }

    document.getElementById('time_range').addEventListener('change', fetchAlerts);
    document.getElementById('model_key').addEventListener('change', fetchAlerts);
    document.getElementById('status_filter').addEventListener('change', fetchAlerts);
    document.getElementById('refresh_btn').addEventListener('click', fetchAlerts);
    fetchAlerts();
})();
    </script>
</body>
</html>
