<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Windows</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --accent: #2563eb; --green: #16a34a; --orange: #ea580c; --red: #dc2626; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 20px 0; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .header { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        .header label { margin-right: 6px; color: var(--muted); font-size: 0.875rem; }
        .header select, .header input[type="number"], .header input[type="text"] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); min-width: 100px; }
        .header .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
        .header .filters .cb { display: inline-flex; align-items: center; gap: 6px; }
        .header .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--border); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn.primary:hover { filter: brightness(1.05); }
        .stats { display: flex; flex-wrap: wrap; gap: 20px; padding: 12px 16px; margin-bottom: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem; }
        .stats span { color: var(--muted); }
        .stats strong { margin-left: 4px; }
        .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
        .meta .error { color: var(--red); }
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--border); font-weight: 600; font-size: 0.8rem; }
        tr:hover { background: #f1f5f9; }
        .conf-high { color: var(--green); }
        .conf-mid { color: var(--orange); }
        .conf-low { color: var(--red); }
        .win-id { font-family: ui-monospace, monospace; font-size: 0.85em; }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; margin: 0 2px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; max-width: 500px; width: 100%; max-height: 80vh; overflow: auto; padding: 20px; }
        .modal h3 { margin-top: 0; }
        .modal pre { font-size: 0.8rem; white-space: pre-wrap; word-break: break-all; }
        .modal .close { float: right; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recent Windows</h1>
        <div class="header">
            <div>
                <label for="model_key">Model</label>
                <select id="model_key">
                    {% for m in models %}
                    <option value="{{ m }}" {% if m == model_key %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="cb"><input type="checkbox" id="auto_refresh" checked> Auto-refresh</label>
            </div>
            <div>
                <label for="interval">Interval</label>
                <select id="interval">
                    <option value="1">1s</option>
                    <option value="3" selected>3s</option>
                    <option value="5">5s</option>
                    <option value="10">10s</option>
                </select>
            </div>
            <div>
                <label for="limit">Limit</label>
                <select id="limit">
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                </select>
            </div>
            <div class="filters">
                <label for="filter_device">Device</label>
                <input type="text" id="filter_device" placeholder="device_id">
                <label for="filter_camera">Camera</label>
                <input type="text" id="filter_camera" placeholder="camera_id">
                <label for="filter_track">Track</label>
                <input type="number" id="filter_track" placeholder="track" min="0" style="width:70px">
                <label for="filter_pred_label">Pred label</label>
                <select id="filter_pred_label">
                    <option value="">—</option>
                </select>
                <label class="cb"><input type="checkbox" id="filter_only_pred"> Only with predictions</label>
                <label class="cb"><input type="checkbox" id="filter_low_conf"> Only low conf (&lt;0.6)</label>
            </div>
            <div class="actions">
                <button type="button" class="btn primary" id="refresh_now">Refresh now</button>
                <button type="button" class="btn" id="clear_filters">Clear filters</button>
                <a href="/windows/label" class="btn" id="link_label">Open Label Windows</a>
            </div>
        </div>
        <div class="stats" id="stats">
            <span>Windows: <strong id="stat_count">0</strong></span>
            <span>With predictions: <strong id="stat_with_pred">0</strong></span>
            <span>Avg pred_conf: <strong id="stat_avg_conf">—</strong></span>
            <span>Low-conf (&lt;0.6): <strong id="stat_low_conf">0</strong></span>
            <span>Latest: <strong id="stat_latest">—</strong></span>
        </div>
        <div class="meta">
            <span id="last_updated">Last updated: —</span>
            <span id="last_error" class="error"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Window ID</th>
                    <th>Device</th>
                    <th>FPS</th>
                    <th>Track</th>
                    <th>Person</th>
                    <th>Face Conf</th>
                    <th>Predicted</th>
                    <th>Pred Conf</th>
                    <th>Model</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="12" style="text-align:center;color:var(--muted);">Loading…</td></tr>
            </tbody>
        </table>
    </div>
    <div class="modal" id="detail_modal">
        <div class="modal-content">
            <span class="close" id="modal_close">&times;</span>
            <h3>Window details</h3>
            <pre id="detail_body"></pre>
        </div>
    </div>
    <script>
(function() {
    const API_KEY = {{ api_key|tojson }};
    const API_HEADERS = { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' };
    let fetchInProgress = false;
    let refreshTimer = null;
    let currentRows = [];

    function buildParams() {
        const params = new URLSearchParams();
        const model = document.getElementById('model_key').value;
        if (model) params.set('model_key', model);
        params.set('limit', document.getElementById('limit').value);
        const dev = document.getElementById('filter_device').value.trim();
        if (dev) params.set('device_id', dev);
        const cam = document.getElementById('filter_camera').value.trim();
        if (cam) params.set('camera_id', cam);
        const track = document.getElementById('filter_track').value;
        if (track !== '') params.set('track_id', track);
        if (document.getElementById('filter_only_pred').checked) params.set('only_with_predictions', 'true');
        const predLabel = document.getElementById('filter_pred_label').value;
        if (predLabel) params.set('pred_label', predLabel);
        if (document.getElementById('filter_low_conf').checked) params.set('max_pred_conf', '0.6');
        return params;
    }

    function formatDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function formatTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function timeRange(tsStart, tsEnd) {
        if (tsStart == null || tsEnd == null) return '—';
        const dur = ((tsEnd - tsStart) / 1000).toFixed(1);
        return tsStart + ' → ' + tsEnd + ' (' + dur + 's)';
    }

    function confClass(c) {
        if (c == null) return '';
        if (c < 0.5) return 'conf-low';
        if (c < 0.75) return 'conf-mid';
        return 'conf-high';
    }

    function shortId(id) {
        return id ? id.slice(0, 8) : '—';
    }

    function updateLabelFilter(labels) {
        const sel = document.getElementById('filter_pred_label');
        const cur = sel.value;
        sel.innerHTML = '<option value="">—</option>';
        (labels || []).forEach(l => {
            const o = document.createElement('option');
            o.value = l;
            o.textContent = l;
            if (l === cur) o.selected = true;
            sel.appendChild(o);
        });
    }

    function loadModelLabels() {
        const model = document.getElementById('model_key').value;
        if (!model) return;
        fetch('/v1/models/' + encodeURIComponent(model), { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : Promise.reject(new Error('Model not found')))
            .then(data => updateLabelFilter(data.labels || []))
            .catch(() => updateLabelFilter([]));
    }

    function renderTable(rows) {
        currentRows = rows;
        const tbody = document.getElementById('tbody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--muted);">No windows.</td></tr>';
            return;
        }
        const model = document.getElementById('model_key').value;
        tbody.innerHTML = rows.map(row => {
            const pred = row.prediction || {};
            const conf = pred.pred_conf;
            const modelStr = pred.model_key ? (pred.model_key + (pred.model_version ? ' @ ' + pred.model_version : '')) : '—';
            const personName = row.person_name || (row.person_id ? shortId(row.person_id) : '—');
            const personConf = row.person_conf;
            const personCell = row.person_id 
                ? '<a href="/persons/' + row.person_id + '">' + personName + '</a>'
                : personName;
            return '<tr data-id="' + (row.id || '') + '">' +
                '<td>' + formatDate(row.created_at) + '</td>' +
                '<td>' + formatTime(row.created_at) + '</td>' +
                '<td class="win-id">' + shortId(row.id) + '</td>' +
                '<td>' + (row.device_id || '—') + '</td>' +
                '<td>' + (row.fps != null ? row.fps : '—') + '</td>' +
                '<td>' + (row.track_id ?? '—') + '</td>' +
                '<td>' + personCell + '</td>' +
                '<td><span class="' + confClass(personConf) + '">' + (personConf != null ? personConf.toFixed(2) : '—') + '</span></td>' +
                '<td>' + (pred.pred_label || '—') + '</td>' +
                '<td><span class="' + confClass(conf) + '">' + (conf != null ? conf.toFixed(2) : '—') + '</span></td>' +
                '<td>' + modelStr + '</td>' +
                '<td>' +
                '<a href="/windows/label?model_key=' + encodeURIComponent(model) + '&window_id=' + encodeURIComponent(row.id || '') + '" class="btn btn-sm">Label</a>' +
                '</td></tr>';
        }).join('');
    }

    function updateStats(rows) {
        const withPred = rows.filter(r => r.prediction).length;
        const preds = rows.map(r => r.prediction?.pred_conf).filter(c => c != null);
        const avg = preds.length ? (preds.reduce((a,b) => a + b, 0) / preds.length).toFixed(2) : '—';
        const low = preds.filter(c => c < 0.6).length;
        let latest = '—';
        if (rows.length && rows[0].created_at) {
            const d = new Date(rows[0].created_at);
            latest = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        document.getElementById('stat_count').textContent = rows.length;
        document.getElementById('stat_with_pred').textContent = withPred;
        document.getElementById('stat_avg_conf').textContent = avg;
        document.getElementById('stat_low_conf').textContent = low;
        document.getElementById('stat_latest').textContent = latest;
    }

    function fetchData() {
        if (fetchInProgress) return;
        fetchInProgress = true;
        document.getElementById('last_error').textContent = '';
        const url = '/v1/dashboard/windows?' + buildParams().toString();
        fetch(url, { headers: { 'X-API-Key': API_KEY } })
            .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
            .then(data => {
                const rows = Array.isArray(data) ? data : [];
                renderTable(rows);
                updateStats(rows);
                document.getElementById('last_updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            })
            .catch(err => {
                document.getElementById('last_error').textContent = 'Last error: ' + (err.message || 'Request failed');
            })
            .finally(() => { fetchInProgress = false; });
    }

    function runPredict(windowId) {
        const model = document.getElementById('model_key').value;
        if (!model) return;
        fetch('/v1/windows/' + encodeURIComponent(windowId) + '/predict', {
            method: 'POST',
            headers: API_HEADERS,
            body: JSON.stringify({ model_key: model, store: true, return_probs: false })
        })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(() => fetchData())
            .catch(() => { document.getElementById('last_error').textContent = 'Predict failed'; });
    }

    function openDetail(id) {
        if (!id) return;
        fetch('/v1/windows/' + encodeURIComponent(id), { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                document.getElementById('detail_body').textContent = JSON.stringify(data, null, 2);
                document.getElementById('detail_modal').classList.add('show');
            })
            .catch(() => { document.getElementById('detail_body').textContent = 'Failed to load.'; document.getElementById('detail_modal').classList.add('show'); });
    }

    function scheduleRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (!document.getElementById('auto_refresh').checked) return;
        const sec = parseInt(document.getElementById('interval').value, 10) * 1000;
        refreshTimer = setInterval(() => {
            if (document.visibilityState === 'hidden') return;
            fetchData();
        }, sec);
    }

    document.getElementById('model_key').addEventListener('change', () => { loadModelLabels(); fetchData(); scheduleRefresh(); });
    document.getElementById('limit').addEventListener('change', fetchData);
    document.getElementById('interval').addEventListener('change', scheduleRefresh);
    document.getElementById('auto_refresh').addEventListener('change', scheduleRefresh);
    document.getElementById('filter_device').addEventListener('change', fetchData);
    document.getElementById('filter_camera').addEventListener('change', fetchData);
    document.getElementById('filter_track').addEventListener('change', fetchData);
    document.getElementById('filter_pred_label').addEventListener('change', fetchData);
    document.getElementById('filter_only_pred').addEventListener('change', fetchData);
    document.getElementById('filter_low_conf').addEventListener('change', fetchData);
    document.getElementById('refresh_now').addEventListener('click', () => { fetchData(); });
    document.getElementById('clear_filters').addEventListener('click', () => {
        document.getElementById('filter_device').value = '';
        document.getElementById('filter_camera').value = '';
        document.getElementById('filter_track').value = '';
        document.getElementById('filter_pred_label').value = '';
        document.getElementById('filter_only_pred').checked = false;
        document.getElementById('filter_low_conf').checked = false;
        fetchData();
    });
    document.getElementById('link_label').href = '/windows/label?model_key=' + encodeURIComponent(document.getElementById('model_key').value);
    document.getElementById('model_key').addEventListener('change', () => { document.getElementById('link_label').href = '/windows/label?model_key=' + encodeURIComponent(document.getElementById('model_key').value); });
    document.getElementById('modal_close').addEventListener('click', () => document.getElementById('detail_modal').classList.remove('show'));
    document.getElementById('detail_modal').addEventListener('click', e => { if (e.target.id === 'detail_modal') e.target.classList.remove('show'); });

    loadModelLabels();
    fetchData();
    scheduleRefresh();
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = null; }
        else scheduleRefresh();
    });
})();
    </script>
</body>
</html>
