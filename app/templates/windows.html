<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Windows</title>
    <link rel="stylesheet" href="/static/css/untitled-ui.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="/dashboard" class="site-logo">HAR Cloud App</a>
            <nav class="site-nav">
                <a href="/dashboard"><span class="nav-icon icon-overview"></span>Overview</a>
                <a href="/windows" class="active"><span class="nav-icon icon-windows"></span>Activity Windows</a>
                <div class="nav-sub">
                    <a href="/windows/label">Edit Windows</a>
                </div>
                <a href="/persons"><span class="nav-icon icon-persons"></span>Person Management</a>
                <a href="/unknown-persons"><span class="nav-icon icon-unknown"></span>Unknown Persons</a>
                <a href="/alerts"><span class="nav-icon icon-alerts"></span>Alerts</a>
                <a href="/system"><span class="nav-icon icon-system"></span>Models / System</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="container">
        <h1>Activity Windows</h1>
        <div class="header">
            <h2 class="filters-title">Filters</h2>
            <div class="filter-row">
                <div>
                    <label for="model_key">Model</label>
                    <select id="model_key">
                        {% for m in models %}
                        <option value="{{ m }}" {% if m == model_key %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="limit">Limit</label>
                    <select id="limit">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="200">200</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div>
                    <label for="filter_device">Device</label>
                    <select id="filter_device">
                        <option value="">— All —</option>
                    </select>
                </div>
                <div>
                    <label for="filter_camera">Camera</label>
                    <select id="filter_camera">
                        <option value="">— All —</option>
                    </select>
                </div>
                <div>
                    <label for="filter_activity">Activity</label>
                    <select id="filter_activity">
                        <option value="">— All —</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filters">
                    <label class="cb"><input type="checkbox" id="filter_only_pred"> Only with predictions</label>
                    <label class="cb"><input type="checkbox" id="filter_low_conf"> Only low conf (&lt;0.6)</label>
                    <label class="cb"><input type="checkbox" id="auto_refresh" checked> Auto-refresh (5s)</label>
                </div>
                <div class="actions">
                    <button type="button" class="btn" id="clear_filters">Clear filters</button>
                </div>
            </div>
        </div>
        <div class="meta">
            <span id="last_error" class="error"></span>
        </div>
        <div class="card">
            <h2>Activity Windows</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Window ID</th>
                            <th>Device</th>
                            <th>FPS</th>
                            <th>Person</th>
                            <th>Face Conf</th>
                            <th>Predicted</th>
                            <th>Pred Conf</th>
                            <th>Model</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="10" style="text-align:center;color:var(--muted);">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    <div class="modal" id="detail_modal">
        <div class="modal-content">
            <span class="close" id="modal_close">&times;</span>
            <h3>Window details</h3>
            <pre id="detail_body"></pre>
        </div>
    </div>
    <script>
(function() {
    const API_KEY = {{ api_key|tojson }};
    const API_HEADERS = { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' };
    let fetchInProgress = false;
    let refreshTimer = null;
    let currentRows = [];
    let currentPage = 1;
    let hasMore = false;

    function buildParams() {
        const params = new URLSearchParams();
        const model = document.getElementById('model_key').value;
        if (model) params.set('model_key', model);
        const limit = parseInt(document.getElementById('limit').value, 10);
        params.set('limit', limit);
        params.set('offset', (currentPage - 1) * limit);
        const dev = document.getElementById('filter_device').value;
        if (dev) params.set('device_id', dev);
        const cam = document.getElementById('filter_camera').value;
        if (cam) params.set('camera_id', cam);
        const activity = document.getElementById('filter_activity').value;
        if (activity) params.set('pred_label', activity);
        if (document.getElementById('filter_only_pred').checked) params.set('only_with_predictions', 'true');
        if (document.getElementById('filter_low_conf').checked) params.set('max_pred_conf', '0.6');
        return params;
    }

    function formatDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function formatTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function timeRange(tsStart, tsEnd) {
        if (tsStart == null || tsEnd == null) return '—';
        const dur = ((tsEnd - tsStart) / 1000).toFixed(1);
        return tsStart + ' → ' + tsEnd + ' (' + dur + 's)';
    }

    function confClass(c) {
        if (c == null) return '';
        if (c < 0.5) return 'conf-low';
        if (c < 0.75) return 'conf-mid';
        return 'conf-high';
    }

    function shortId(id) {
        return id ? id.slice(0, 8) : '—';
    }

    function escapeAttr(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function fillActivityFilter(labels) {
        const sel = document.getElementById('filter_activity');
        const cur = sel.value;
        const list = Array.isArray(labels) ? labels : [];
        sel.innerHTML = '<option value="">— All —</option>' + list.map(l => '<option value="' + escapeAttr(l) + '">' + escapeAttr(l) + '</option>').join('');
        if (cur && list.indexOf(cur) !== -1) sel.value = cur;
    }

    function fetchFilterOptions() {
        fetch('/v1/dashboard/filter-options', { headers: { 'X-API-Key': API_KEY } })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => {
                const devSel = document.getElementById('filter_device');
                const camSel = document.getElementById('filter_camera');
                const curDev = devSel.value;
                const curCam = camSel.value;
                const devices = Array.isArray(data.devices) ? data.devices : [];
                const cameras = Array.isArray(data.cameras) ? data.cameras : [];
                devSel.innerHTML = '<option value="">— All —</option>' + devices.map(d => '<option value="' + escapeAttr(d) + '">' + escapeAttr(d) + '</option>').join('');
                camSel.innerHTML = '<option value="">— All —</option>' + cameras.map(c => '<option value="' + escapeAttr(c) + '">' + escapeAttr(c) + '</option>').join('');
                if (curDev && devices.indexOf(curDev) !== -1) devSel.value = curDev;
                if (curCam && cameras.indexOf(curCam) !== -1) camSel.value = curCam;
            })
            .catch(() => {});
    }

    function loadModelLabels() {
        const model = document.getElementById('model_key').value;
        if (!model) { fillActivityFilter([]); return; }
        fetch('/v1/models/' + encodeURIComponent(model), { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : Promise.reject(new Error('Model not found')))
            .then(data => fillActivityFilter(data.labels || []))
            .catch(() => fillActivityFilter([]));
    }

    function renderTable(rows) {
        currentRows = rows;
        const tbody = document.getElementById('tbody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--muted);">No windows.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(row => {
            const pred = row.prediction || {};
            const conf = pred.pred_conf;
            const modelStr = pred.model_key ? (pred.model_key + (pred.model_version ? ' @ ' + pred.model_version : '')) : '—';
            const personName = row.person_name || (row.person_id ? shortId(row.person_id) : '—');
            const personConf = row.person_conf;
            const personCell = row.person_id 
                ? '<a href="/persons/' + row.person_id + '">' + personName + '</a>'
                : personName;
            return '<tr data-id="' + (row.id || '') + '">' +
                '<td>' + formatDate(row.created_at) + '</td>' +
                '<td>' + formatTime(row.created_at) + '</td>' +
                '<td class="win-id">' + shortId(row.id) + '</td>' +
                '<td>' + (row.device_id || '—') + '</td>' +
                '<td>' + (row.fps != null ? row.fps : '—') + '</td>' +
                '<td>' + personCell + '</td>' +
                '<td><span class="' + confClass(personConf) + '">' + (personConf != null ? personConf.toFixed(2) : '—') + '</span></td>' +
                '<td>' + (pred.pred_label || '—') + '</td>' +
                '<td><span class="' + confClass(conf) + '">' + (conf != null ? conf.toFixed(2) : '—') + '</span></td>' +
                '<td>' + modelStr + '</td></tr>';
        }).join('');
    }

    function fetchData() {
        if (fetchInProgress) return;
        fetchInProgress = true;
        document.getElementById('last_error').textContent = '';
        const url = '/v1/dashboard/windows?' + buildParams().toString();
        fetch(url, { headers: { 'X-API-Key': API_KEY } })
            .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
            .then(resp => {
                const rows = (resp && resp.data !== undefined) ? resp.data : (Array.isArray(resp) ? resp : []);
                hasMore = (resp && resp.has_more === true);
                renderTable(rows);
                renderPagination();
            })
            .catch(err => {
                document.getElementById('last_error').textContent = 'Last error: ' + (err.message || 'Request failed');
            })
            .finally(() => { fetchInProgress = false; });
    }

    function runPredict(windowId) {
        const model = document.getElementById('model_key').value;
        if (!model) return;
        fetch('/v1/windows/' + encodeURIComponent(windowId) + '/predict', {
            method: 'POST',
            headers: API_HEADERS,
            body: JSON.stringify({ model_key: model, store: true, return_probs: false })
        })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(() => fetchData())
            .catch(() => { document.getElementById('last_error').textContent = 'Predict failed'; });
    }

    function openDetail(id) {
        if (!id) return;
        fetch('/v1/windows/' + encodeURIComponent(id), { headers: { 'X-API-Key': API_KEY } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                document.getElementById('detail_body').textContent = JSON.stringify(data, null, 2);
                document.getElementById('detail_modal').classList.add('show');
            })
            .catch(() => { document.getElementById('detail_body').textContent = 'Failed to load.'; document.getElementById('detail_modal').classList.add('show'); });
    }

    function renderPagination() {
        const limit = parseInt(document.getElementById('limit').value, 10);
        const el = document.getElementById('pagination');
        let html = '';
        if (currentPage > 1) {
            html += '<button type="button" class="btn btn-page" data-page="' + (currentPage - 1) + '">Prev</button>';
        }
        const maxShow = Math.max(currentPage, 5);
        for (let p = 1; p <= maxShow; p++) {
            html += '<button type="button" class="btn btn-page' + (p === currentPage ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
        }
        if (hasMore) {
            html += '<button type="button" class="btn btn-page" data-page="' + (currentPage + 1) + '">Next</button>';
        }
        el.innerHTML = html || '<span style="color:var(--muted);">Page ' + currentPage + '</span>';
        el.querySelectorAll('.btn-page').forEach(btn => {
            btn.addEventListener('click', () => {
                const p = parseInt(btn.dataset.page, 10);
                if (p >= 1) { currentPage = p; fetchData(); }
            });
        });
    }

    function scheduleRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (!document.getElementById('auto_refresh').checked) return;
        const sec = 5000;
        refreshTimer = setInterval(() => {
            if (document.visibilityState === 'hidden') return;
            fetchData();
        }, sec);
    }

    document.getElementById('model_key').addEventListener('change', () => { currentPage = 1; loadModelLabels(); fetchData(); scheduleRefresh(); });
    document.getElementById('limit').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('auto_refresh').addEventListener('change', scheduleRefresh);
    document.getElementById('filter_device').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('filter_camera').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('filter_activity').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('filter_only_pred').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('filter_low_conf').addEventListener('change', () => { currentPage = 1; fetchData(); });
    document.getElementById('clear_filters').addEventListener('click', () => {
        document.getElementById('filter_device').value = '';
        document.getElementById('filter_camera').value = '';
        document.getElementById('filter_activity').value = '';
        document.getElementById('filter_only_pred').checked = false;
        document.getElementById('filter_low_conf').checked = false;
        currentPage = 1;
        fetchData();
    });
    document.getElementById('modal_close').addEventListener('click', () => document.getElementById('detail_modal').classList.remove('show'));
    document.getElementById('detail_modal').addEventListener('click', e => { if (e.target.id === 'detail_modal') e.target.classList.remove('show'); });

    fetchFilterOptions();
    loadModelLabels();
    fetchData();
    scheduleRefresh();
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = null; }
        else scheduleRefresh();
    });
})();
    </script>
</body>
</html>
